services:
  coach-ia:
    build: .
    ports:
      - "3001:3000"  # opcional al usar nginx-proxy-manager
    volumes:
      - .:/app
      - /app/node_modules
      - ./prisma/dev.db:/app/prisma/dev.db
    environment:
      - NODE_ENV=development
    command: npm run dev
    networks:
      - inmich_net

networks:
  inmich_net:
    external: true